<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Netflix Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
    <img src="images/netflix-bag.jpg" alt="Netflix background" class="background">

    <div class="overlay"></div>

    <img src="https://loodibee.com/wp-content/uploads/Netflix-logo.png" alt="Netflix logo" class="logo">

    <div class="maintext">
        <h1>Unlimited Movies, TV shows and more</h1>
        <p>Starts at ₹149. Cancel at any time</p>
        <p>Ready to watch? Enter your email to create or restart your membership.</p>
    </div>
    <div class="getstarted">
        <button class="getstarted-btn">Get Started ></button>
    </div>
    <div class="signin">
        <button class="signin-btn">Sign In</button>
    </div>

    <div class="trending-section">
        <h2>Trending Now</h2>
        <div class="filters">
          <select>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
          </select>
          <select>
            <option>Movies</option>
            <option>TV Shows</option>
          </select>
        </div>
        <div class="movies-container">
          <!-- Movie Card 1 -->
          <div class="movie-card">
            <img src="https://i.pinimg.com/736x/6f/b0/e3/6fb0e3da349d38ca6aee27663bfab110.jpg" alt="Kick">
            <div class="movie-info">
              <div class="number">1</div>
              <div class="label">Recently added</div>
            </div>
          </div>
          <!-- Movie Card 2 -->
          <div class="movie-card">
            <img src="https://i.pinimg.com/originals/f9/2f/4a/f92f4a337f8ab1e2535b78e220589574.jpg" alt="Wanted">
            <div class="movie-info">
              <div class="number">2</div>
              <div class="label">Recently added</div>
            </div>
          </div>
          <!-- Movie Card 3 -->
          <div class="movie-card">
            <img src="https://images.mid-day.com/images/images/2015/jun/15-bajrangi-bhaijaan-poster.jpg" alt="Bajrangi Bhaijaan">
            <div class="movie-info">
              <div class="number">3</div>
              <div class="label">Recently added</div>
            </div>
          </div>
          <!-- Add more movie cards as needed -->
        </div>
      </div>
